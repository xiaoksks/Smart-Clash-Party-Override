name: Update Clash Party Override

on:
  workflow_dispatch:
  schedule:
    # Daily at 17:00 UTC, 01:00 Beijing time.
    - cron: '0 17 * * *'

permissions:
  contents: write

concurrency:
  group: update-clash-party-override
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and validate merged override
        run: npm run check

      - name: Publish build summary
        run: npm run report >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: override-build-diagnostics
          path: |
            .build/
            dist/Smart-Override.js
          if-no-files-found: ignore

      - name: Commit generated override
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update generated clash party override'
          file_pattern: dist/Smart-Override.js
