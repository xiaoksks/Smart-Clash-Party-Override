# ================================================================
# Clash Smart v5.4.32-cmfa.1 - CMFA (Clash Meta for Android) 配置
# Build: 2026-06-25
# 架构：proxy-providers 订阅 + 22 url-test 区域组（11 全部 + 11 家宽，家宽 filter 新增 IEPL/IPLC/专线识别）+ 33 业务策略组（含 14 流媒体平台组）+ 382 rule-providers
# 基线：Clash Party v5.4.32（唯一主线）
# v5.4.32: FIX#168-CN-GAME 国内游戏前置到国外游戏宽规则之前，避免 HoYoverse / Game / category-games 抢先代理
# 变更历史：见 `Clash Meta For Android/CHANGELOG.md`
# ================================================================
# ★ 快速上手：
#   1. 将 proxy-providers → Subscribe → url 替换为你的机场订阅链接
#   2. 导入 CMFA 即可使用
#   3. 首次导入后 CMFA 会自动下载 Loyalsoldier 增强版 GeoIP / GeoSite 数据库
# ================================================================
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
keep-alive-idle: 30
keep-alive-interval: 15
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat'
  mmdb: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb'
  asn: 'https://fastly.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb'
  geosite: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat'
hosts:
  'dns.alidns.com':
  - 223.5.5.5
  - 223.6.6.6
  'doh.pub':
  - 119.29.29.29
  'dns.google':
  - 8.8.8.8
  - 8.8.4.4
  'cloudflare-dns.com':
  - 1.1.1.1
  - 1.0.0.1
profile:
  store-selected: true
  store-fake-ip: true
  tracing: true
dns:
  enable: true
  ipv6: false
  prefer-h3: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - +.lan
  - +.local
  - +.localdomain
  - +.home.arpa
  - +.msftconnecttest.com
  - +.msftncsi.com
  - localhost.ptlogin2.qq.com
  - localhost.sec.qq.com
  - localhost.work.weixin.qq.com
  - +.in-addr.arpa
  - +.ip6.arpa
  - time.*.com
  - time.*.gov
  - ntp.*.com
  - pool.ntp.org
  - +.ntp.org
  - +.pool.ntp.org
  - +.market.xiaomi.com
  - +.stun.*.*
  - +.stun.*.*.*
  - +.turn.*.*
  - +.turn.*.*.*
  - +.n.n.srv.nintendo.net
  - +.stun.playstation.net
  - +.xboxlive.com
  - stun.l.google.com
  - stun1.l.google.com
  - stun2.l.google.com
  - stun3.l.google.com
  - stun4.l.google.com
  - global.turn.twilio.com
  - auth.docker.io
  - registry-1.docker.io
  - index.docker.io
  - hub.docker.com
  - production.cloudflare.docker.com
  - +.push.apple.com
  - +.pub.3gppnetwork.org
  - +.bing.com
  - +.rustdesk.com
  # v5.4.19 #3 借鉴 Proxy-override：远控/游戏/P2P 需真实 IP 才能打洞/直连（同 RustDesk 语义）
  - +.todesk.com
  - +.oray.com
  - +.sunlogin.com
  - +.teamviewer.com
  - +.anydesk.com
  - +.battlenet.com.cn
  - +.wotgame.cn
  - +.wggames.cn
  - +.wowsgame.cn
  - +.mcdn.bilivideo.cn
  - +.miwifi.com
  - +.courier.push.apple.com
  - +.miui.com
  - +.xiaomi.com
  - +.xiaomi.net
  - +.mijia.tech
  - +.gotui.com
  # FIX#HOSTS-ALIGN: use-hosts 改 true（对齐主线，hosts 已固定全部 DoH 域名 IP，消除 fake-ip 冷启动循环依赖）
  use-hosts: true
  use-system-hosts: false
  cache-algorithm: arc
  respect-rules: true
  default-nameserver:
  - 'https://223.5.5.5/dns-query'
  - 'https://223.6.6.6/dns-query'
  - 'https://8.8.8.8/dns-query'
  - 'https://1.1.1.1/dns-query'
  - '223.5.5.5'
  nameserver:
  - 'https://dns.alidns.com/dns-query'
  - 'https://doh.pub/dns-query'
  proxy-server-nameserver:
  - 'https://cloudflare-dns.com/dns-query'
  - 'https://dns.google/dns-query'
  - 'https://dns.alidns.com/dns-query'
  - 'https://doh.pub/dns-query'
  direct-nameserver:
  - 'https://dns.alidns.com/dns-query'
  - 'https://doh.pub/dns-query'
  # v5.4.19 #5 借鉴 Proxy-override：让 direct-nameserver 也遵循 nameserver-policy（默认 false 会忽略它）。policy 仅含境外 CDN，零国内误伤。
  direct-nameserver-follow-policy: true
  nameserver-policy:
    '+.jsdelivr.net':
    - 'https://cloudflare-dns.com/dns-query'
    - 'https://dns.google/dns-query'
    '+.github.com':
    - 'https://cloudflare-dns.com/dns-query'
    - 'https://dns.google/dns-query'
    '+.githubusercontent.com':
    - 'https://cloudflare-dns.com/dns-query'
    - 'https://dns.google/dns-query'
    '+.githubassets.com':
    - 'https://cloudflare-dns.com/dns-query'
    - 'https://dns.google/dns-query'
    '+.fastly.net':
    - 'https://cloudflare-dns.com/dns-query'
    - 'https://dns.google/dns-query'
  fallback:
  - 'https://cloudflare-dns.com/dns-query'
  - 'https://dns.google/dns-query'
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
    - gfw
    - geolocation-!cn
    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
    - 127.0.0.0/8
    - 10.0.0.0/8
    - 192.168.0.0/16
    domain: []
sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: true
  sniff:
    HTTP:
      ports:
      - '80'
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - '443'
      - '8443'
    QUIC:
      ports:
      - '443'
      - '8443'
      - '4433'
  skip-domain:
  - +.push.apple.com
  skip-dst-address:
  - 91.105.192.0/23
  - 91.108.4.0/22
  - 91.108.8.0/21
  - 91.108.16.0/21
  - 91.108.56.0/22
