  - 149.154.160.0/20
  - 185.76.151.0/24
  - '2001:67c:4e8::/48'
  - '2001:b28:f23c::/47'
  - '2001:b28:f23f::/48'
  - '2a0a:f280:203::/48'
  force-domain: []
  skip-src-address: []
proxy-providers:
  Subscribe:
    type: http
    url: 'https://starlink.aliyundeepsearch.sbs/s/a12a944e1b3edb0ee95300a75f09c6b0'
    interval: 86400
    path: ./proxy_providers/subscribe.yaml
    health-check:
      enable: true
      url: 'https://www.gstatic.com/generate_204'
      interval: 300
    # v5.4.20 #6 借鉴 Proxy-override：补充 junk 关键词（免费/试用/应急 中文子串；Sign/Login/Register/Help/FAQ 英文用 \b 词边界，RE2 下避免误伤 Signal 等）
    exclude-filter: '(?i)(导航网址|距离下次重置|剩余流量|套餐到期|网址导航|官网|订阅|到期|剩余|重置|免费|试用|应急|\bSign\b|\bLogin\b|\bRegister\b|\bHelp\b|\bFAQ\b)'
